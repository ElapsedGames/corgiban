<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Left ear -->
  <path d="M5 18 L1 3 L13 13 Z" fill="#1a1a1a"/>
  <!-- Right ear -->
  <path d="M27 18 L31 3 L19 13 Z" fill="#1a1a1a"/>
